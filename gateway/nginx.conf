# Single entry point for the whole stack. Routes API traffic to the
# contact-api microservice and everything else to the Next.js web service.
# This is also where a real domain + TLS gets attached later (see README).

upstream web_upstream {
  server web:3000;
}

upstream contact_api_upstream {
  server contact-api:4000;
}

server {
  listen 80;
  server_name _;

  # Keep client bodies small — this proxy only ever needs to carry a
  # short contact-form submission, never file uploads.
  client_max_body_size 256k;

  location /api/ {
    proxy_pass http://contact_api_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
